name: Release LocalEdit

on:
  push:
    tags:
      - 'localedit-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Fix Windows path issue
        run: git config --global core.protectNTFS false

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd LocalEdit
          pip install -r Requirements.txt
          pip install pyinstaller PyQt5 moviepy

      - name: Build executable
        run: |
          cd LocalEdit
          pyinstaller --onefile --windowed --name LocalEdit Src/main.py

      - name: Package zip
        run: |
          cd LocalEdit/dist
          Compress-Archive -Path LocalEdit.exe -DestinationPath LocalEdit-${{ github.ref_name }}-Windows.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: LocalEdit/dist/LocalEdit-${{ github.ref_name }}-Windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd LocalEdit
          pip3 install -r Requirements.txt
          pip3 install pyinstaller PyQt5 moviepy

      - name: Build executable
        run: |
          cd LocalEdit
          pyinstaller --onefile --windowed --name LocalEdit Src/main.py

      - name: Package zip
        run: |
          cd LocalEdit/dist
          zip -r LocalEdit-${{ github.ref_name }}-Mac.zip LocalEdit.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: LocalEdit/dist/LocalEdit-${{ github.ref_name }}-Mac.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd LocalEdit
          pip3 install -r Requirements.txt
          pip3 install pyinstaller PyQt5 moviepy

      - name: Build executable
        run: |
          cd LocalEdit
          pyinstaller --onefile --name LocalEdit Src/main.py

      - name: Package zip
        run: |
          cd LocalEdit/dist
          zip LocalEdit-${{ github.ref_name }}-Linux.zip LocalEdit

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: LocalEdit/dist/LocalEdit-${{ github.ref_name }}-Linux.zip