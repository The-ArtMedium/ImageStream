on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Build Windows
        run: cargo tauri build
        working-directory: LocalBeat
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: LocalBeat-Windows-Installer
          path: LocalBeat/src-tauri/target/release/bundle/msi/*.msi

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Build Mac
        run: cargo tauri build
        working-directory: LocalBeat
      - name: Upload Mac Installer
        uses: actions/upload-artifact@v4
        with:
          name: LocalBeat-Mac-Installer
          path: LocalBeat/src-tauri/target/release/bundle/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev \
            libappindicator3-dev librsvg2-dev patchelf
      - name: Install Tauri CLI
        run: cargo install tauri-cli
      - name: Build Linux
        run: cargo tauri build
        working-directory: LocalBeat
      - name: Upload Linux Installer
        uses: actions/upload-artifact@v4
        with:
          name: LocalBeat-Linux-Installer
          path: LocalBeat/src-tauri/target/release/bundle/deb/*.deb