name: Build LocalRAW

on:
  push:
    branches: [ main ]
    paths:
      - 'LocalRAW/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Fix Windows path issue
        run: git config --global core.protectNTFS false

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd LocalRAW
          pip install -r requirements.txt
          pip install pyinstaller PySide6

      - name: Build executable
        run: |
          cd LocalRAW
          pyinstaller --onefile --windowed --name LocalRAW app/main.py

      - name: Package zip
        run: |
          cd LocalRAW/dist
          Compress-Archive -Path LocalRAW.exe -DestinationPath LocalRAW-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalRAW-Windows
          path: LocalRAW/dist/LocalRAW-Windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd LocalRAW
          pip3 install -r requirements.txt
          pip3 install pyinstaller PySide6

      - name: Build executable
        run: |
          cd LocalRAW
          pyinstaller --onefile --windowed --name LocalRAW app/main.py

      - name: Package zip
        run: |
          cd LocalRAW/dist
          zip -r LocalRAW-Mac.zip LocalRAW.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalRAW-Mac
          path: LocalRAW/dist/LocalRAW-Mac.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip libraw-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd LocalRAW
          pip3 install -r requirements.txt
          pip3 install pyinstaller PySide6

      - name: Build executable
        run: |
          cd LocalRAW
          pyinstaller --onefile --name LocalRAW app/main.py

      - name: Package zip
        run: |
          cd LocalRAW/dist
          zip LocalRAW-Linux.zip LocalRAW

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalRAW-Linux
          path: LocalRAW/dist/LocalRAW-Linux.zip