name: Release FocusCheck

on:
  push:
    tags:
      - 'focuscheck-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Fix Windows path issue
        run: git config --global core.protectNTFS false

      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd FocusCheck
          pip install opencv-python Pillow rawpy pyinstaller

      - name: Build executable
        run: |
          cd FocusCheck
          pyinstaller --onefile --windowed --name FocusCheck focus_check.py

      - name: Package zip
        run: |
          cd FocusCheck/dist
          Compress-Archive -Path FocusCheck.exe -DestinationPath FocusCheck-${{ github.ref_name }}-Windows.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: FocusCheck/dist/FocusCheck-${{ github.ref_name }}-Windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd FocusCheck
          pip3 install opencv-python Pillow rawpy pyinstaller

      - name: Build executable
        run: |
          cd FocusCheck
          pyinstaller --onefile --windowed --name FocusCheck focus_check.py

      - name: Package zip
        run: |
          cd FocusCheck/dist
          zip -r FocusCheck-${{ github.ref_name }}-Mac.zip FocusCheck.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: FocusCheck/dist/FocusCheck-${{ github.ref_name }}-Mac.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-tk

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd FocusCheck
          pip3 install opencv-python Pillow rawpy pyinstaller

      - name: Build executable
        run: |
          cd FocusCheck
          pyinstaller --onefile --name FocusCheck focus_check.py

      - name: Package zip
        run: |
          cd FocusCheck/dist
          zip FocusCheck-${{ github.ref_name }}-Linux.zip FocusCheck

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: FocusCheck/dist/FocusCheck-${{ github.ref_name }}-Linux.zip
