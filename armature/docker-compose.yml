version: '3.8'

services:
  # The Nervous System (Automation)
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
    volumes:
      - ./services/n8n:/home/node/.n8n
    networks:
      - armature_net

  # The Resonant Heart (Local AI)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./services/ollama:/root/.ollama
    networks:
      - armature_net

  # The Intelligent Filter (Search)
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      - MEILI_MASTER_KEY=${MEILI_KEY}
    volumes:
      - ./services/meilisearch:/meili_data
    networks:
      - armature_net

  # The Flow Regulator (Cache/Rate Limit)
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./services/redis:/data
    networks:
      - armature_net

  # The Mantle Conduit (API Bridge)
  api:
    build: ./services/api
    container_name: armature_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - MEILI_URL=http://meilisearch:7700
      - MEILI_KEY=${MEILI_KEY}
      - REDIS_URL=redis://redis:6379
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook
      - WP_WEBHOOK_SECRET=${WP_WEBHOOK_SECRET}
    volumes:
      - ./services/api:/app
    networks:
      - armature_net
    depends_on:
      - ollama
      - meilisearch
      - redis

networks:
  armature_net:
    driver: bridge