
[package]
name = "localbeat"
version = "0.1.0"
description = "LocalBeat — Sound for Everyone. Part of the ImageStream Local Suite."
authors = ["The Art Medium"]
license = "MIT"
repository = "https://github.com/The-ArtMedium/ImageStream"
edition = "2021"
rust-version = "1.57"

[build-dependencies]
tauri-build = { version = "1.0", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "1.0", features = [
  "fs-all",
  "dialog-all",
  "shell-open"
]}

[features]
default = [ "custom-protocol" ]
custom-protocol = [ "tauri/custom-protocol" ]
