[package]
name = "localbeat"
version = "0.1.0"
description = "LocalBeat — Sound for Everyone. Part of the ImageStream Local Suite."
authors = ["The Art Medium"]
license = "MIT"
repository = "https://github.com/The-ArtMedium/ImageStream"
edition = "2021"
rust-version = "1.70"

[[bin]]
name = "localbeat"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
tauri = { version = "2", features = [] }
